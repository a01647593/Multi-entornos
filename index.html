<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Release Board Básico</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="hero">
        <p class="eyebrow">Laboratorio básico</p>
        <h1>Release Board</h1>
        <p class="subtitle">
          Práctica inicial de versiones y multientornos con HTML, CSS y JavaScript.
        </p>
      </section>

      <section class="grid">
        <article class="card highlight">
          <h2>Entorno</h2>
          <p id="environment" class="badge">cargando...</p>
        </article>

        <article class="card">
          <h2>Versión</h2>
          <p id="version" class="mono">cargando...</p>
        </article>

        <article class="card">
          <h2>Última actualización</h2>
          <p id="updatedAt">cargando...</p>
        </article>
      </section>

      <section class="card">
        <h2>Cambios de esta versión</h2>
        <ul id="changes"></ul>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
